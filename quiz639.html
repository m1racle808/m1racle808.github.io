<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Сказочная викторина</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #ffffff;
    color: #222;
    text-align: center;
}

.card { padding: 20px; }

.timer {
    font-size: 30px;
    margin: 10px;
}

.answers {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    width: 80%;
    margin: auto;
}

.answer {
    padding: 20px;
    font-size: 18px;
    border-radius: 10px;
    cursor: pointer;
    color: white;
}

.red { background: #e21b3c; }
.blue { background: #1368ce; }
.yellow { background: #d89e00; }
.green { background: #26890c; }

button {
    padding: 10px 20px;
    margin: 5px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
}

input {
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    border: 1px solid #ccc;
}

.confetti {
    position: fixed;
    top: 0;
    animation: fall linear forwards;
}

@keyframes fall {
    to {
        transform: translateY(100vh);
        opacity: 0;
    }
}
</style>
</head>

<body>

<h1>🌟 Сказочная викторина</h1>

<div id="start" class="card">
    <p>Введите названия команд</p>
    <input id="name1" placeholder="Команда 1">
    <input id="name2" placeholder="Команда 2">
    <input id="name3" placeholder="Команда 3"><br>
    <button onclick="startGame()">Начать</button>
</div>

<div id="score"></div>
<div id="teams" style="display:none;"></div>

<div id="quiz" class="card" style="display:none;">
    <div class="timer" id="timer">10</div>
    <h2 id="question"></h2>
    <div class="answers" id="answers"></div>
</div>

<script>

let teamNames = ["1","2","3"];
let scores = [0,0,0];
let currentTeam = 0;
let currentQuestion = 0;
let time = 10;
let timerInterval;

const questions = [
{q:"Какой предмет указывал путь Ивану-царевичу?",a:["Клубок","Компас","Корабль","Перо"],correct:0},
{q:"Кто помог вытянуть репку предпоследним?",a:["Внучка","Кошка","Жучка","Бабка"],correct:2},
{q:"Как звали медведя из сказки «Маша и медведь»?",a:["Топтыгин","Леший","Миша","Михайло Потапыч"],correct:3},

{q:"Какая обувь была у Золушки (Гримм)?",a:["Хрустальная","Золотая","Кожаная","Железная"],correct:1},
{q:"Были ли имена у гномов?",a:["Да","Нет","Только у одного","Неизвестно"],correct:1},

{q:"Что было в корзинке Красной Шапочки?",a:["Пирожки и масло","Конфеты","Яблоки","Молоко"],correct:0},
{q:"Во что превратилась карета?",a:["Тыква","Лук","Кабачок","Арбуз"],correct:0},
{q:"Как Кот ловил кроликов?",a:["С сетью","С собаками","С мышами","С мешком овса"],correct:3},

{q:"Кто нашёл лампу?",a:["Синдбад","Али-Баба","Аладдин","Халиф"],correct:2},
{q:"Сколько разбойников?",a:["40","33","12","100"],correct:0},
{q:"На чём летал Синдбад?",a:["Слон","Птица Рух","Ковер","Черепаха"],correct:1},

{q:"Кого звали Малыш?",a:["Мальчик Карлсона","Эльф","Гном","Конь"],correct:0},
{q:"Как звали девочку из «Снежной королевы»?",a:["Герда","Эльза","Снежка","Аня"],correct:0},

{q:"Какая птица помогала Маугли?",a:["Каа","Рикки","Балу","Чиль"],correct:3},
{q:"Что появлялось от копыт антилопы?",a:["Цветы","Золото","Камни","Вода"],correct:1},

{q:"Что подарили Ма Ляну?",a:["Меч","Кисть","Зеркало","Свиток"],correct:1},

{q:"Из чего родился Момотаро?",a:["Апельсин","Персик","Арбуз","Бамбук"],correct:1},
{q:"Откуда Кагуя?",a:["Океан","Луна","Цветок","Вулкан"],correct:1},

{q:"Как звали паука-хитреца?",a:["Ананси","Мпангу","Кибако","Сукуру"],correct:0},

{q:"Кем был Чиполлино?",a:["Помидор","Луковка","Апельсин","Редис"],correct:1},
{q:"Главный враг Чиполлино?",a:["Помидор","Лимон","Вишенка","Тыква"],correct:1},

{q:"Кто не хотел расти?",a:["Алиса","Питер Пэн","Винни-Пух","Мэри"],correct:1},
{q:"Где живут хоббиты?",a:["Пещеры","Норы","Замки","Деревья"],correct:1},

{q:"Какая птица создаёт гром?",a:["Орёл","Гром-птица","Колибри","Журавль"],correct:1},
{q:"Кто победил в «Чей нос лучше?»",a:["Обезьяна","Тапир","Комар","Ягуар"],correct:2},

{q:"Как звали героя-шутника?",a:["Насреддин","Кельоглам","Карагёз","Бекташ"],correct:1},

{q:"Кто искал невесту?",a:["Леший","Русалка","Водяной","Чёрт"],correct:2},

{q:"В какой сказке солома вместо мозга?",a:["Изумрудный город","Чиполлино","Незнайка","Буратино"],correct:0},
{q:"Кто украл лампу Аладдина?",a:["Джинн","Магриб","Султан","Принцесса"],correct:1},
{q:"Чем закончилось украшение ворона и совы?",a:["Белый/чёрный","Чёрный/пёстрый","Серые","Лысая"],correct:1}
];

function startGame(){
    teamNames[0]=name1.value||"Команда 1";
    teamNames[1]=name2.value||"Команда 2";
    teamNames[2]=name3.value||"Команда 3";

    start.style.display='none';
    teams.style.display='block';
    renderTeams();
    updateScore();
}

function renderTeams(){
    teams.innerHTML=`
    <p>Выберите команду</p>
    <button onclick="selectTeam(0)">${teamNames[0]}</button>
    <button onclick="selectTeam(1)">${teamNames[1]}</button>
    <button onclick="selectTeam(2)">${teamNames[2]}</button>
    `;
}

function updateScore(){
    score.innerHTML=`🏆 ${teamNames[0]}: ${scores[0]} |
    ${teamNames[1]}: ${scores[1]} |
    ${teamNames[2]}: ${scores[2]}`;
}

function selectTeam(team){
    currentTeam=team;
    teams.style.display='none';
    quiz.style.display='block';
    loadQuestion();
}

function loadQuestion(){
    if(currentQuestion>=questions.length){
        showWinner();
        return;
    }

    let q=questions[currentQuestion];
    question.innerText=q.q;

    let colors=["red","blue","yellow","green"];
    answers.innerHTML=q.a.map((ans,i)=>
    `<div class="answer ${colors[i]}" onclick="answer(${i})">${ans}</div>`).join("");

    startTimer();
}

function startTimer(){
    time=10;
    timer.innerText=time;

    clearInterval(timerInterval);
    timerInterval=setInterval(()=>{
        time--;
        timer.innerText=time;

        if(time<=0){
            clearInterval(timerInterval);

            quiz.innerHTML=`<h2>⏱ Время вышло!</h2>`;
            setTimeout(()=>{reset();},2000);
        }
    },1000);
}

function answer(i){
    clearInterval(timerInterval);

    let q=questions[currentQuestion];

    if(i===q.correct){
        scores[currentTeam]++;
        createConfetti(200);

        quiz.innerHTML=`<h2>✅ Правильно!</h2>`;
        currentQuestion++;
    } else {
        quiz.innerHTML=`<h2>❌ Неправильно!</h2>`;
    }

    updateScore();
    setTimeout(()=>{reset();},2000);
}

function reset(){
    quiz.style.display='none';
    teams.style.display='block';
    quiz.innerHTML=`<div class="timer" id="timer">10</div>
    <h2 id="question"></h2>
    <div class="answers" id="answers"></div>`;
}

function createConfetti(n){
    for(let i=0;i<n;i++){
        let d=document.createElement("div");
        d.className="confetti";
        d.style.left=Math.random()*100+"vw";
        d.style.width=d.style.height=(Math.random()*8+4)+"px";
        d.style.background=["red","yellow","blue","green","black"][Math.floor(Math.random()*5)];
        d.style.animationDuration=(Math.random()*3+2)+"s";
        document.body.appendChild(d);
        setTimeout(()=>d.remove(),4000);
    }
}

function showWinner(){
    let max=Math.max(...scores);
    let winner=teamNames[scores.indexOf(max)];

    document.body.innerHTML=`<h1>🏆 Победитель: ${winner}</h1>`;
    createConfetti(300);
}

</script>

</body>
</html>
