<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Сказочная викторина</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: white;
    color: black;
    text-align: center;
    font-size: 18px;
}

h1 {
    font-size: 36px;
}

.card { padding: 20px; }

.timer {
    font-size: 36px;
    margin: 10px;
}

.answers {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    width: 80%;
    margin: auto;
}

.answer {
    padding: 25px;
    font-size: 20px;
    border-radius: 10px;
    cursor: pointer;
    color: white;
}

.red { background: #e21b3c; }
.blue { background: #1368ce; }
.yellow { background: #d89e00; }
.green { background: #26890c; }

button {
    padding: 12px 25px;
    margin: 8px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-size: 18px;
}

input {
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    border: 1px solid #ccc;
}

.confetti {
    position: fixed;
    top: 0;
    animation: fall linear forwards;
}

@keyframes fall {
    to {
        transform: translateY(100vh);
        opacity: 0;
    }
}
</style>
</head>

<body>

<h1>🌟 Сказочная викторина 🌟</h1>

<div id="start" class="card">
    <p>Введите названия команд</p>
    <input id="name1" placeholder="Команда 1">
    <input id="name2" placeholder="Команда 2">
    <input id="name3" placeholder="Команда 3"><br>
    <button onclick="startGame()">Начать</button>
</div>

<div id="score"></div>

<div id="teams" style="display:none;"></div>

<div id="quiz" class="card" style="display:none;">
    <div class="timer" id="timer">10</div>
    <h2 id="question"></h2>
    <div class="answers" id="answers"></div>
</div>

<script>

let teamNames = ["1","2","3"];
let scores = [0,0,0];
let currentTeam = 0;
let currentQuestion = 0;
let time = 10;
let timerInterval;

const questions = [
{q:"Что потеряла Золушка?",a:["Кольцо","Туфельку","Шарф","Перчатку"],correct:1},
{q:"Как звали мальчика с деревянным носом?",a:["Буратино","Чиполлино","Пиноккио","Пьеро"],correct:2},
{q:"Из чего был домик у Братца Кролика?",a:["Кирпич","Тыква","Палки","Камыш"],correct:1},
{q:"Кого нашли в персике?",a:["Журавля","Обезьяну","Момотаро","Дракона"],correct:2},
{q:"Что получила Русалочка?",a:["Палочку","Ноги","Камень","Королевство"],correct:1},
{q:"Что было у Алладина?",a:["Ковер","Лампа","Сапоги","Кольцо"],correct:1},
{q:"Кто помог Жене?",a:["Волшебник","Старушка","Цветок","Собака"],correct:1},
{q:"Кто писал про Бременских музыкантов?",a:["Гауф","Гримм","Гофман","Буш"],correct:1},
{q:"Что помогло попасть в Изумрудный город?",a:["Свисток","Флейта","Башмачки","Арфа"],correct:2},
{q:"Кто говорил про щучье веленье?",a:["Иван","Емеля","Щука","Царевна"],correct:1}
];

function startGame(){
    teamNames[0]=document.getElementById('name1').value||"Команда 1";
    teamNames[1]=document.getElementById('name2').value||"Команда 2";
    teamNames[2]=document.getElementById('name3').value||"Команда 3";

    document.getElementById('start').style.display='none';
    document.getElementById('teams').style.display='block';
    renderTeams();
    updateScore();
}

function renderTeams(){
    document.getElementById('teams').innerHTML=`
    <p>Выберите команду</p>
    <button onclick="selectTeam(0)">${teamNames[0]}</button>
    <button onclick="selectTeam(1)">${teamNames[1]}</button>
    <button onclick="selectTeam(2)">${teamNames[2]}</button>
    `;
}

function updateScore(){
    document.getElementById('score').innerHTML=
    `🏆 ${teamNames[0]}: ${scores[0]} |
     ${teamNames[1]}: ${scores[1]} |
     ${teamNames[2]}: ${scores[2]}`;
}

function selectTeam(team){
    currentTeam=team;
    document.getElementById('teams').style.display='none';
    document.getElementById('quiz').style.display='block';
    loadQuestion();
}

function loadQuestion(){
    if(currentQuestion>=questions.length){
        showWinner();
        return;
    }

    let q=questions[currentQuestion];
    document.getElementById('question').innerText=q.q;

    let colors=["red","blue","yellow","green"];
    let html="";
    q.a.forEach((ans,i)=>{
        html+=`<div class="answer ${colors[i]}" onclick="answer(${i})">${ans}</div>`;
    });

    document.getElementById('answers').innerHTML=html;

    startTimer();
}

function startTimer(){
    time=10;
    document.getElementById('timer').innerText=time;

    clearInterval(timerInterval);
    timerInterval=setInterval(()=>{
        time--;
        document.getElementById('timer').innerText=time;

        if(time<=0){
            clearInterval(timerInterval);

            document.getElementById('quiz').innerHTML = `
                <h2>⏱ Время вышло!</h2>
            `;

            setTimeout(()=>{
                document.getElementById('quiz').style.display='none';
                document.getElementById('teams').style.display='block';
                resetQuizUI();
            },2000);
        }

    },1000);
}

function answer(i){
    clearInterval(timerInterval);

    let correctIndex = questions[currentQuestion].correct;

    if(i===correctIndex){
        scores[currentTeam]++;
        createConfetti(200);

        document.getElementById('quiz').innerHTML = `
            <h2>✅ Правильно!</h2>
        `;

        currentQuestion++;
    } else {
        document.getElementById('quiz').innerHTML = `
            <h2>❌ Неправильно!</h2>
        `;
    }

    updateScore();

    setTimeout(()=>{
        document.getElementById('quiz').style.display='none';
        document.getElementById('teams').style.display='block';
        resetQuizUI();
    },2000);
}

function resetQuizUI(){
    document.getElementById('quiz').innerHTML = `
        <div class="timer" id="timer">10</div>
        <h2 id="question"></h2>
        <div class="answers" id="answers"></div>
    `;
}

function createConfetti(n){
    for(let i=0;i<n;i++){
        let d=document.createElement("div");
        d.className="confetti";
        d.style.left=Math.random()*100+"vw";
        d.style.width = d.style.height = (Math.random()*8+4)+"px";
        d.style.background=["red","yellow","blue","green"][Math.floor(Math.random()*4)];
        d.style.animationDuration=(Math.random()*3+2)+"s";
        document.body.appendChild(d);
        setTimeout(()=>d.remove(),4000);
    }
}

function showWinner(){
    let max=Math.max(...scores);
    let winner=teamNames[scores.indexOf(max)];

    document.body.innerHTML=`
    <h1>🏆 Победитель: ${winner} 🏆</h1>
    <p>Поздравляем!</p>
    `;

    createConfetti(300);
}

</script>

</body>
</html>
