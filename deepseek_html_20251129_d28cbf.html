<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monsub - Управление подписками</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Базовые стили */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --primary-bg: #ffffff;
            --secondary-bg: #f8f9fa;
            --card-bg: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #4a4a4a;
            --accent: #2c2c2c;
            --border: #e0e0e0;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --transition: all 0.3s ease;
        }

        .dark-mode {
            --primary-bg: #121212;
            --secondary-bg: #1e1e1e;
            --card-bg: #252525;
            --text-primary: #f5f5f5;
            --text-secondary: #b0b0b0;
            --accent: #e0e0e0;
            --border: #333333;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        body {
            background-color: var(--primary-bg);
            color: var(--text-primary);
            line-height: 1.6;
            transition: var(--transition);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Стили для страницы аутентификации */
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--secondary-bg);
            padding: 20px;
        }

        .auth-form {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 440px;
            transition: var(--transition);
        }

        .auth-form h2 {
            text-align: center;
            margin-bottom: 30px;
            font-weight: 600;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .form-group input {
            width: 100%;
            padding: 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 16px;
            background-color: var(--primary-bg);
            color: var(--text-primary);
            transition: var(--transition);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(44, 44, 44, 0.1);
        }

        .btn {
            display: inline-block;
            padding: 16px 24px;
            background-color: var(--accent);
            color: var(--primary-bg);
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            text-align: center;
            transition: var(--transition);
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background-color: var(--secondary-bg);
        }

        .auth-switch {
            text-align: center;
            margin-top: 20px;
        }

        .auth-switch a {
            color: var(--text-secondary);
            text-decoration: none;
            cursor: pointer;
            transition: var(--transition);
        }

        .auth-switch a:hover {
            color: var(--text-primary);
            text-decoration: underline;
        }

        /* Стили для главной страницы */
        .main-container {
            display: none;
            padding: 20px 0;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo {
            color: var(--accent);
            font-weight: 800;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-email {
            font-weight: 500;
        }

        .icon-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background-color: var(--secondary-bg);
            color: var(--text-primary);
            border: none;
            cursor: pointer;
            transition: var(--transition);
        }

        .icon-btn:hover {
            background-color: var(--accent);
            color: var(--primary-bg);
            transform: scale(1.05);
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background-color: var(--card-bg);
            padding: 24px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            text-align: center;
            transition: var(--transition);
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        }

        .stat-card h3 {
            margin-bottom: 12px;
            font-size: 16px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
        }

        .subscription-level {
            background-color: var(--accent);
            color: var(--primary-bg);
            padding: 8px 16px;
            border-radius: var(--radius-md);
            font-size: 14px;
            display: inline-block;
        }

        .actions {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .sort-options {
            display: flex;
            gap: 10px;
        }

        .sort-options select {
            padding: 12px 16px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            background-color: var(--primary-bg);
            color: var(--text-primary);
            cursor: pointer;
            transition: var(--transition);
        }

        .sort-options select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .subscriptions-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        .subscription-card {
            background-color: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 24px;
            position: relative;
            transition: var(--transition);
            box-shadow: var(--shadow);
            border-left: 4px solid transparent;
        }

        .subscription-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        }

        .subscription-card.expiring {
            border-left-color: #ff6b6b;
        }

        .subscription-card.expiring::before {
            content: "Скоро истекает";
            position: absolute;
            top: -10px;
            right: 20px;
            background-color: #ff6b6b;
            color: white;
            padding: 4px 12px;
            border-radius: var(--radius-sm);
            font-size: 12px;
            font-weight: 500;
        }

        .subscription-card h3 {
            margin-bottom: 16px;
            font-weight: 600;
            font-size: 20px;
        }

        .subscription-details {
            margin-bottom: 20px;
        }

        .subscription-detail {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }

        .subscription-detail:last-child {
            border-bottom: none;
        }

        .subscription-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .btn-small {
            padding: 10px 16px;
            font-size: 14px;
            width: auto;
            border-radius: var(--radius-md);
        }

        .btn-danger {
            background-color: #ff6b6b;
        }

        .btn-danger:hover {
            background-color: #ff5252;
        }

        /* Стили для модальных окон */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: var(--radius-xl);
            width: 100%;
            max-width: 500px;
            position: relative;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            transition: var(--transition);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: var(--transition);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background-color: var(--secondary-bg);
            color: var(--text-primary);
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 24px;
        }

        /* Стили для уведомлений */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 16px 24px;
            background-color: var(--accent);
            color: var(--primary-bg);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow);
            z-index: 1100;
            display: none;
            max-width: 300px;
            transition: var(--transition);
        }

        .notification.error {
            background-color: #ff6b6b;
        }

        .notification.success {
            background-color: #51cf66;
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            .auth-form {
                padding: 30px 20px;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }

            .actions {
                flex-direction: column;
            }

            .sort-options {
                flex-wrap: wrap;
            }

            .subscriptions-list {
                grid-template-columns: 1fr;
            }

            .user-info {
                width: 100%;
                justify-content: space-between;
            }
        }

        /* Анимации */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.4s ease forwards;
        }

        /* Дополнительные стили для улучшения UX */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .progress-bar {
            height: 6px;
            background-color: var(--border);
            border-radius: 3px;
            margin-top: 10px;
            overflow: hidden;
        }

        .progress {
            height: 100%;
            background-color: var(--accent);
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        .limit-warning {
            background-color: #fff3cd;
            border: 1px solid #ffeaa7;
            color: #856404;
            padding: 12px 16px;
            border-radius: var(--radius-md);
            margin-bottom: 20px;
            display: none;
        }

        .dark-mode .limit-warning {
            background-color: #332701;
            border-color: #665c00;
            color: #ffd54f;
        }
    </style>
</head>
<body>
    <!-- Страница аутентификации -->
    <div id="auth-page" class="auth-container">
        <div class="auth-form fade-in">
            <h2 id="auth-title">Вход в <span class="logo">Monsub</span></h2>
            <form id="auth-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn" id="auth-submit">Войти</button>
            </form>
            <div class="auth-switch">
                <a id="auth-switch-link">Зарегистрироваться</a>
            </div>
        </div>
    </div>

    <!-- Главная страница -->
    <div id="main-page" class="main-container">
        <div class="container">
            <div class="header">
                <h1><span class="logo">Monsub</span> - управление подписками</h1>
                <div class="user-info">
                    <span class="user-email" id="user-email"></span>
                    <button class="icon-btn" id="theme-toggle" title="Сменить тему">
                        <i class="fas fa-moon"></i>
                    </button>
                    <button class="icon-btn" id="logout-btn" title="Выйти">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>

            <div class="limit-warning" id="limit-warning">
                <i class="fas fa-exclamation-triangle"></i> Вы приближаетесь к лимиту в 30 подписок
            </div>

            <div class="stats-container">
                <div class="stat-card fade-in">
                    <h3>Лимит подписок</h3>
                    <div class="stat-value">
                        <span id="max-subscriptions">30</span> подписок
                    </div>
                </div>
                <div class="stat-card fade-in">
                    <h3>Использовано подписок</h3>
                    <div class="stat-value">
                        <span id="used-subscriptions">0</span> / <span id="max-subscriptions-value">30</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress" id="subscription-progress" style="width: 0%"></div>
                    </div>
                </div>
                <div class="stat-card fade-in">
                    <h3>Общие расходы в месяц</h3>
                    <div class="stat-value">
                        <span id="total-cost">0</span> руб.
                    </div>
                </div>
            </div>

            <div class="actions">
                <button class="btn" id="add-subscription-btn">
                    <i class="fas fa-plus"></i> Добавить подписку
                </button>
                <div class="sort-options">
                    <select id="sort-by" class="btn-secondary">
                        <option value="name">По названию</option>
                        <option value="cost">По стоимости</option>
                        <option value="endDate">По дате окончания</option>
                    </select>
                    <select id="sort-order" class="btn-secondary">
                        <option value="asc">По возрастанию</option>
                        <option value="desc">По убыванию</option>
                    </select>
                </div>
            </div>

            <div class="subscriptions-list" id="subscriptions-list">
                <!-- Список подписок будет генерироваться динамически -->
                <div class="empty-state" id="empty-state" style="display: none;">
                    <i class="fas fa-box-open"></i>
                    <h3>У вас пока нет подписок</h3>
                    <p>Добавьте первую подписку, чтобы начать отслеживание</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Модальное окно добавления подписки -->
    <div id="add-subscription-modal" class="modal">
        <div class="modal-content fade-in">
            <div class="modal-header">
                <h2>Добавить подписку</h2>
                <button class="modal-close">&times;</button>
            </div>
            <form id="add-subscription-form">
                <div class="form-group">
                    <label for="subscription-name">Название</label>
                    <input type="text" id="subscription-name" required placeholder="Netflix, Spotify...">
                </div>
                <div class="form-group">
                    <label for="subscription-cost">Стоимость (руб./мес.)</label>
                    <input type="number" id="subscription-cost" min="0" step="0.01" required placeholder="0.00">
                </div>
                <div class="form-group">
                    <label for="subscription-start">Дата начала</label>
                    <input type="date" id="subscription-start" required>
                </div>
                <div class="form-group">
                    <label for="subscription-period">Период (дни)</label>
                    <input type="number" id="subscription-period" min="1" required placeholder="30">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="cancel-add-subscription">Отмена</button>
                    <button type="submit" class="btn">Сохранить</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Уведомление -->
    <div id="notification" class="notification"></div>

    <script>
        // Основные переменные приложения
        let currentUser = null;
        let users = JSON.parse(localStorage.getItem('users')) || {};
        let subscriptions = JSON.parse(localStorage.getItem('subscriptions')) || {};
        let isDarkMode = localStorage.getItem('darkMode') === 'true';
        const MAX_SUBSCRIPTIONS = 30;

        // Элементы DOM
        const authPage = document.getElementById('auth-page');
        const mainPage = document.getElementById('main-page');
        const authForm = document.getElementById('auth-form');
        const authTitle = document.getElementById('auth-title');
        const authSubmit = document.getElementById('auth-submit');
        const authSwitchLink = document.getElementById('auth-switch-link');
        const userEmail = document.getElementById('user-email');
        const logoutBtn = document.getElementById('logout-btn');
        const themeToggle = document.getElementById('theme-toggle');
        const usedSubscriptions = document.getElementById('used-subscriptions');
        const maxSubscriptions = document.getElementById('max-subscriptions-value');
        const totalCost = document.getElementById('total-cost');
        const subscriptionProgress = document.getElementById('subscription-progress');
        const addSubscriptionBtn = document.getElementById('add-subscription-btn');
        const sortBy = document.getElementById('sort-by');
        const sortOrder = document.getElementById('sort-order');
        const subscriptionsList = document.getElementById('subscriptions-list');
        const emptyState = document.getElementById('empty-state');
        const limitWarning = document.getElementById('limit-warning');
        const addSubscriptionModal = document.getElementById('add-subscription-modal');
        const addSubscriptionForm = document.getElementById('add-subscription-form');
        const cancelAddSubscription = document.getElementById('cancel-add-subscription');
        const notification = document.getElementById('notification');

        // Инициализация приложения
        function initApp() {
            // Проверяем, есть ли активный пользователь
            const activeUser = localStorage.getItem('activeUser');
            if (activeUser && users[activeUser]) {
                currentUser = activeUser;
                showMainPage();
            } else {
                showAuthPage();
            }

            // Применяем тему
            applyTheme();

            // Настройка обработчиков событий
            setupEventListeners();
        }

        // Настройка обработчиков событий
        function setupEventListeners() {
            // Аутентификация
            authForm.addEventListener('submit', handleAuth);
            authSwitchLink.addEventListener('click', toggleAuthMode);
            
            // Главная страница
            logoutBtn.addEventListener('click', handleLogout);
            themeToggle.addEventListener('click', toggleTheme);
            addSubscriptionBtn.addEventListener('click', showAddSubscriptionModal);
            sortBy.addEventListener('change', renderSubscriptions);
            sortOrder.addEventListener('change', renderSubscriptions);
            
            // Модальные окна
            cancelAddSubscription.addEventListener('click', hideAddSubscriptionModal);
            addSubscriptionForm.addEventListener('submit', handleAddSubscription);
            
            // Закрытие модальных окон по клику вне области
            window.addEventListener('click', (e) => {
                if (e.target === addSubscriptionModal) {
                    hideAddSubscriptionModal();
                }
            });
            
            // Закрытие модальных окон по кнопке закрытия
            document.querySelectorAll('.modal-close').forEach(btn => {
                btn.addEventListener('click', () => {
                    hideAddSubscriptionModal();
                });
            });
        }

        // Показать страницу аутентификации
        function showAuthPage() {
            authPage.style.display = 'flex';
            mainPage.style.display = 'none';
            authForm.reset();
        }

        // Показать главную страницу
        function showMainPage() {
            authPage.style.display = 'none';
            mainPage.style.display = 'block';
            userEmail.textContent = currentUser;
            updateUserStats();
            renderSubscriptions();
        }

        // Обработка аутентификации
        function handleAuth(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                showNotification('Заполните все поля', 'error');
                return;
            }
            
            const isLoginMode = authSubmit.textContent === 'Войти';
            
            if (isLoginMode) {
                // Вход
                if (users[email] && users[email].password === password) {
                    currentUser = email;
                    localStorage.setItem('activeUser', email);
                    showMainPage();
                } else {
                    showNotification('Неверный email или пароль', 'error');
                }
            } else {
                // Регистрация
                if (users[email]) {
                    showNotification('Пользователь с таким email уже существует', 'error');
                } else {
                    users[email] = {
                        password: password
                    };
                    // Инициализируем пустой массив подписок для нового пользователя
                    if (!subscriptions[email]) {
                        subscriptions[email] = [];
                    }
                    localStorage.setItem('users', JSON.stringify(users));
                    localStorage.setItem('subscriptions', JSON.stringify(subscriptions));
                    currentUser = email;
                    localStorage.setItem('activeUser', email);
                    showMainPage();
                    showNotification('Регистрация прошла успешно!', 'success');
                }
            }
        }

        // Переключение режима аутентификации (вход/регистрация)
        function toggleAuthMode() {
            const isLoginMode = authSubmit.textContent === 'Войти';
            
            if (isLoginMode) {
                authTitle.textContent = 'Регистрация в Monsub';
                authSubmit.textContent = 'Зарегистрироваться';
                authSwitchLink.textContent = 'Войти';
            } else {
                authTitle.textContent = 'Вход в Monsub';
                authSubmit.textContent = 'Войти';
                authSwitchLink.textContent = 'Зарегистрироваться';
            }
        }

        // Выход из системы
        function handleLogout() {
            currentUser = null;
            localStorage.removeItem('activeUser');
            showAuthPage();
        }

        // Показать модальное окно добавления подписки
        function showAddSubscriptionModal() {
            const userSubscriptions = subscriptions[currentUser] || [];
            
            if (userSubscriptions.length >= MAX_SUBSCRIPTIONS) {
                showNotification(`Достигнут лимит подписок. Максимум: ${MAX_SUBSCRIPTIONS}`, 'error');
                return;
            }
            
            addSubscriptionForm.reset();
            document.getElementById('subscription-start').valueAsDate = new Date();
            addSubscriptionModal.style.display = 'flex';
        }

        // Скрыть модальное окно добавления подписки
        function hideAddSubscriptionModal() {
            addSubscriptionModal.style.display = 'none';
        }

        // Обработка добавления подписки
        function handleAddSubscription(e) {
            e.preventDefault();
            
            const name = document.getElementById('subscription-name').value;
            const cost = parseFloat(document.getElementById('subscription-cost').value);
            const startDate = new Date(document.getElementById('subscription-start').value);
            const period = parseInt(document.getElementById('subscription-period').value);
            
            if (!name || isNaN(cost) || isNaN(period) || !startDate.getTime()) {
                showNotification('Заполните все поля корректно', 'error');
                return;
            }
            
            if (cost < 0) {
                showNotification('Стоимость не может быть отрицательной', 'error');
                return;
            }
            
            if (period < 1) {
                showNotification('Период должен быть не менее 1 дня', 'error');
                return;
            }
            
            const endDate = new Date(startDate);
            endDate.setDate(endDate.getDate() + period);
            
            const subscription = {
                id: Date.now(),
                name,
                cost,
                startDate: startDate.toISOString(),
                endDate: endDate.toISOString(),
                period
            };
            
            if (!subscriptions[currentUser]) {
                subscriptions[currentUser] = [];
            }
            
            subscriptions[currentUser].push(subscription);
            localStorage.setItem('subscriptions', JSON.stringify(subscriptions));
            
            updateUserStats();
            renderSubscriptions();
            hideAddSubscriptionModal();
            showNotification('Подписка добавлена', 'success');
        }

        // Удаление подписки
        function deleteSubscription(id) {
            if (!confirm('Вы уверены, что хотите удалить эту подписку?')) {
                return;
            }
            
            subscriptions[currentUser] = subscriptions[currentUser].filter(sub => sub.id !== id);
            localStorage.setItem('subscriptions', JSON.stringify(subscriptions));
            
            updateUserStats();
            renderSubscriptions();
            showNotification('Подписка удалена', 'success');
        }

        // Обновление статистики пользователя
        function updateUserStats() {
            const userSubscriptions = subscriptions[currentUser] || [];
            
            // Обновление счетчика подписок
            const usedCount = userSubscriptions.length;
            usedSubscriptions.textContent = usedCount;
            maxSubscriptions.textContent = MAX_SUBSCRIPTIONS;
            
            // Обновление прогресс-бара
            const progressPercent = Math.min((usedCount / MAX_SUBSCRIPTIONS) * 100, 100);
            subscriptionProgress.style.width = `${progressPercent}%`;
            
            // Показываем предупреждение, если подписок больше 25
            if (usedCount >= 25) {
                limitWarning.style.display = 'block';
            } else {
                limitWarning.style.display = 'none';
            }
            
            // Обновление общей стоимости
            const total = userSubscriptions.reduce((sum, sub) => sum + sub.cost, 0);
            totalCost.textContent = total.toFixed(2);
        }

        // Отрисовка списка подписок
        function renderSubscriptions() {
            const userSubscriptions = subscriptions[currentUser] || [];
            const sortByValue = sortBy.value;
            const sortOrderValue = sortOrder.value;
            
            // Показываем или скрываем состояние "пусто"
            if (userSubscriptions.length === 0) {
                emptyState.style.display = 'block';
                return;
            } else {
                emptyState.style.display = 'none';
            }
            
            // Сортировка подписок
            userSubscriptions.sort((a, b) => {
                let aValue, bValue;
                
                switch(sortByValue) {
                    case 'name':
                        aValue = a.name.toLowerCase();
                        bValue = b.name.toLowerCase();
                        break;
                    case 'cost':
                        aValue = a.cost;
                        bValue = b.cost;
                        break;
                    case 'endDate':
                        aValue = new Date(a.endDate);
                        bValue = new Date(b.endDate);
                        break;
                    default:
                        aValue = a.name.toLowerCase();
                        bValue = b.name.toLowerCase();
                }
                
                if (sortOrderValue === 'desc') {
                    [aValue, bValue] = [bValue, aValue];
                }
                
                if (aValue < bValue) return -1;
                if (aValue > bValue) return 1;
                return 0;
            });
            
            // Очистка списка
            subscriptionsList.innerHTML = '';
            
            // Добавление подписок в список
            userSubscriptions.forEach(sub => {
                const card = document.createElement('div');
                card.className = 'subscription-card fade-in';
                
                // Проверка, истекает ли подписка в ближайшие 7 дней
                const endDate = new Date(sub.endDate);
                const now = new Date();
                const daysLeft = Math.ceil((endDate - now) / (1000 * 60 * 60 * 24));
                
                if (daysLeft <= 7 && daysLeft > 0) {
                    card.classList.add('expiring');
                }
                
                let daysText = '';
                if (daysLeft < 0) {
                    daysText = 'Истекла';
                } else if (daysLeft === 0) {
                    daysText = 'Истекает сегодня';
                } else if (daysLeft === 1) {
                    daysText = '1 день';
                } else if (daysLeft < 5) {
                    daysText = `${daysLeft} дня`;
                } else {
                    daysText = `${daysLeft} дней`;
                }
                
                card.innerHTML = `
                    <h3>${sub.name}</h3>
                    <div class="subscription-details">
                        <div class="subscription-detail">
                            <span>Стоимость:</span>
                            <span>${sub.cost.toFixed(2)} руб./мес</span>
                        </div>
                        <div class="subscription-detail">
                            <span>Дата начала:</span>
                            <span>${formatDate(new Date(sub.startDate))}</span>
                        </div>
                        <div class="subscription-detail">
                            <span>Дата окончания:</span>
                            <span>${formatDate(endDate)}</span>
                        </div>
                        <div class="subscription-detail">
                            <span>Осталось:</span>
                            <span>${daysText}</span>
                        </div>
                    </div>
                    <div class="subscription-actions">
                        <button class="btn btn-small btn-danger" data-id="${sub.id}">
                            <i class="fas fa-trash"></i> Удалить
                        </button>
                    </div>
                `;
                
                subscriptionsList.appendChild(card);
            });
            
            // Добавление обработчиков событий для кнопок удаления
            document.querySelectorAll('.subscription-actions .btn-danger').forEach(btn => {
                btn.addEventListener('click', () => {
                    const id = parseInt(btn.getAttribute('data-id'));
                    deleteSubscription(id);
                });
            });
        }

        // Форматирование даты
        function formatDate(date) {
            return date.toLocaleDateString('ru-RU');
        }

        // Переключение темы
        function toggleTheme() {
            isDarkMode = !isDarkMode;
            localStorage.setItem('darkMode', isDarkMode);
            applyTheme();
        }

        // Применение темы
        function applyTheme() {
            const root = document.documentElement;
            
            if (isDarkMode) {
                document.body.classList.add('dark-mode');
                themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
                themeToggle.setAttribute('title', 'Светлая тема');
            } else {
                document.body.classList.remove('dark-mode');
                themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
                themeToggle.setAttribute('title', 'Темная тема');
            }
        }

        // Показать уведомление
        function showNotification(message, type = '') {
            notification.textContent = message;
            notification.className = 'notification';
            
            if (type) {
                notification.classList.add(type);
            }
            
            notification.style.display = 'block';
            
            setTimeout(() => {
                notification.style.display = 'none';
            }, 3000);
        }

        // Инициализация приложения при загрузке
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
