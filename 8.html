<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Сказочная викторина</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #ffffff;
    color: #222;
    text-align: center;
}

.card { padding: 20px; }

.timer {
    font-size: 30px;
    margin: 10px;
}

.answers {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    width: 80%;
    margin: auto;
}

.answer {
    padding: 20px;
    font-size: 18px;
    border-radius: 10px;
    cursor: pointer;
    color: white;
}

.red { background: #e21b3c; }
.blue { background: #1368ce; }
.yellow { background: #d89e00; }
.green { background: #26890c; }

button {
    padding: 10px 20px;
    margin: 5px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
}

input {
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    border: 1px solid #ccc;
}

.confetti {
    position: fixed;
    top: 0;
    animation: fall linear forwards;
}

@keyframes fall {
    to {
        transform: translateY(100vh);
        opacity: 0;
    }
}
</style>
</head>

<body>

<h1>🌟 Сказочная викторина</h1>

<div id="start" class="card">
    <p>Введите названия команд</p>
    <input id="name1" placeholder="Команда 1">
    <input id="name2" placeholder="Команда 2">
    <input id="name3" placeholder="Команда 3"><br>
    <button onclick="startGame()">Начать</button>
</div>

<div id="score"></div>
<div id="teams" style="display:none;"></div>

<div id="quiz" class="card" style="display:none;">
    <div class="timer" id="timer">10</div>
    <h2 id="question"></h2>
    <div class="answers" id="answers"></div>
</div>

<script>

let teamNames = ["1","2","3"];
let scores = [0,0,0];
let currentTeam = 0;
let currentQuestion = 0;
let time = 10;
let timerInterval;

const questions = [

{q:"Какой предмет в русской сказке указывал путь Ивану-царевичу?",a:["Волшебный клубок","Компас","Летучий корабль","Перо Жар-птицы"],correct:0},
{q:"Кто последним тянул репку в сказке «Репка»?",a:["Кошка","Внучка","Жучка","Мышка"],correct:3},
{q:"Как звали медведя, который пел песенку: «Сижу на пеньке, ем пирожок»?",a:["Топтыгин","Маша и Медведь","Леший","Михайло Потапыч"],correct:3},

{q:"В классической версии братьев Гримм («Золушка») что было на ногах у Золушки?",a:["Хрустальная туфелька","Золотая туфелька","Кожаный башмачок","Железные башмаки"],correct:1},
{q:"Как звали принцессу, которая уколола палец веретеном и уснула на 100 лет?",a:["Белоснежка","Золушка","Спящая красавица","Рапунцель"],correct:2},

{q:"Что было в корзинке у Красной Шапочки для бабушки?",a:["Пирожки и горшочек масла","Конфеты и варенье","Яблоки и мёд","Пирог и кувшин молока"],correct:0},
{q:"Во что превратилась карета Золушки ровно в полночь?",a:["В тыкву","В луковицу","В кабачок","В арбуз"],correct:0},
{q:"Кто помогал Коту в сапогах охотиться на кроликов?",a:["Лиса","Собаки","Мыши","Мешок с овсом"],correct:3},

{q:"Как звали героя, который нашёл лампу с джинном?",a:["Синдбад","Али-Баба","Аладдин","Халиф"],correct:2},
{q:"Сколько разбойников пряталось в пещере «Сезам, откройся!»?",a:["40","33","12","100"],correct:0},
{q:"На каком животном летал Синдбад-мореход?",a:["На слоне","На птице Рух","На ковре-самолёте","На гигантской черепахе"],correct:1},

{q:"Кого в шведской сказке звали «Малыш»?",a:["Мальчика, у которого был Карлсон","Эльфа","Гнома","Конька"],correct:0},
{q:"Как звали девочку из сказки «Снежная королева»?",a:["Герда","Эльза","Снежка","Аня"],correct:0},

{q:"Как звали мудрую птицу из сказок Киплинга про Маугли?",a:["Каа","Рикки-Тикки-Тави","Балу","Чиль"],correct:3},
{q:"В индийской сказке «Золотая антилопа» что выросло на месте удара копыт?",a:["Цветы","Монеты","Драгоценные камни","Вода"],correct:1},

{q:"В сказках народа ашанти хитрец — паук по имени…?",a:["Ананси","Мпангу","Кибако","Сукуру"],correct:0},

{q:"Кем был Чиполлино из сказки Джанни Родари?",a:["Помидором","Луковкой","Апельсином","Редиской"],correct:1},
{q:"Кто был главным врагом Чиполлино?",a:["Синьор Помидор","Принц Лимон","Граф Вишенка","Кум Тыква"],correct:1},

{q:"Как звали мальчика, который не хотел расти?",a:["Алиса","Питер Пэн","Винни-Пух","Мэри Поппинс"],correct:1},
{q:"Где живут хоббиты?",a:["В пещерах","В норах под холмом","В замках","В дуплах деревьев"],correct:1},

{q:"Как звали девочку из индейской легенды, которая соткала звёздное небо?",a:["Покахонтас","Утренняя Звезда","Чёрная Нога","Женщина-Паук"],correct:3},
{q:"Кого в индейских сказках часто называют «обманщиком» (трикстером)?",a:["Орла","Койота","Бизона","Медведя"],correct:1},

{q:"Кто в сказке Карела Чапека искал себе невесту?",a:["Леший","Русалка","Водяной Кубышкин","Чёрт"],correct:2},

{q:"В какой сказке герой получил вместо мозгов солому, вместо сердца жесть, а вместо храбрости кубок?",a:["Волшебник Изумрудного города","Чиполлино","Незнайка на Луне","Приключения Буратино"],correct:0},
{q:"Кто украл лампу Аладдина?",a:["Джинн","Волшебник Магриба","Султан","Принцесса"],correct:1},
{q:"В русской сказке «Царевна-лягушка» что сделал Иван-царевич, когда лягушка превратилась в Василису Премудрую?",a:["Танцевал с ней","Сжёг лягушачью кожу","Поцеловал её","Угостил пирожком"],correct:1}

];

function startGame(){
    teamNames[0]=name1.value||"Команда 1";
    teamNames[1]=name2.value||"Команда 2";
    teamNames[2]=name3.value||"Команда 3";

    start.style.display='none';
    teams.style.display='block';
    renderTeams();
    updateScore();
}

function renderTeams(){
    teams.innerHTML=`
    <p>Выберите команду</p>
    <button onclick="selectTeam(0)">${teamNames[0]}</button>
    <button onclick="selectTeam(1)">${teamNames[1]}</button>
    <button onclick="selectTeam(2)">${teamNames[2]}</button>
    `;
}

function updateScore(){
    score.innerHTML=`🏆 ${teamNames[0]}: ${scores[0]} |
    ${teamNames[1]}: ${scores[1]} |
    ${teamNames[2]}: ${scores[2]}`;
}

function selectTeam(team){
    currentTeam=team;
    teams.style.display='none';
    quiz.style.display='block';
    loadQuestion();
}

function loadQuestion(){
    if(currentQuestion>=questions.length){
        showWinner();
        return;
    }

    let q=questions[currentQuestion];
    question.innerText=q.q;

    let colors=["red","blue","yellow","green"];
    answers.innerHTML=q.a.map((ans,i)=>
    `<div class="answer ${colors[i]}" onclick="answer(${i})">${ans}</div>`).join("");

    startTimer();
}

function startTimer(){
    time=10;
    timer.innerText=time;

    clearInterval(timerInterval);
    timerInterval=setInterval(()=>{
        time--;
        timer.innerText=time;

        if(time<=0){
            clearInterval(timerInterval);
            quiz.innerHTML=`<h2>⏱ Время вышло!</h2>`;
            setTimeout(()=>{reset();},2000);
        }
    },1000);
}

function answer(i){
    clearInterval(timerInterval);

    let q=questions[currentQuestion];

    if(i===q.correct){
        scores[currentTeam]++;
        createConfetti(200);
        quiz.innerHTML=`<h2>✅ Правильно!</h2>`;
        currentQuestion++;
    } else {
        quiz.innerHTML=`<h2>❌ Неправильно!</h2>`;
    }

    updateScore();
    setTimeout(()=>{reset();},2000);
}

function reset(){
    quiz.style.display='none';
    teams.style.display='block';
    quiz.innerHTML=`<div class="timer" id="timer">10</div>
    <h2 id="question"></h2>
    <div class="answers" id="answers"></div>`;
}

function createConfetti(n){
    for(let i=0;i<n;i++){
        let d=document.createElement("div");
        d.className="confetti";
        d.style.left=Math.random()*100+"vw";
        d.style.width=d.style.height=(Math.random()*8+4)+"px";
        d.style.background=["red","yellow","blue","green","black"][Math.floor(Math.random()*5)];
        d.style.animationDuration=(Math.random()*3+2)+"s";
        document.body.appendChild(d);
        setTimeout(()=>d.remove(),4000);
    }
}

function showWinner(){
    let max = Math.max(...scores);
    let winners = scores.filter(s => s === max).length;

    if(winners > 1){
        document.body.innerHTML=`<h1>🤝 Победила дружба!</h1>`;
    } else {
        let winner=teamNames[scores.indexOf(max)];
        document.body.innerHTML=`<h1>🏆 Победитель: ${winner}</h1>`;
    }

    createConfetti(300);
}

</script>

</body>
</html>
